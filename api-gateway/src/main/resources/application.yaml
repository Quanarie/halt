server:
  port: 8080

spring:
  cloud:
    gateway:
      server:
        webflux:
          routes:
            - id: ride-service
              uri: http://localhost:8081
              predicates:
                - Path=/api/rides/**

            - id: payment-service
              uri: http://localhost:8082
              predicates:
                - Path=/api/payments/**

            - id: tracking-service
              uri: http://localhost:8083
              predicates:
                - Path=/api/tracking/**

            - id: notification-service
              uri: http://localhost:8084
              predicates:
                  - Path=/api/notifications/**
